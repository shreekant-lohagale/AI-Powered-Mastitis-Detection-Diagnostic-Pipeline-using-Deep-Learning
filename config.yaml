data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  train_dir: "data/processed/train"
  val_dir: "data/processed/val"
  img_size: 224
  batch_size: 16
  train_split: 0.80

model:
  base_model: "MobileNetV2"
  weights: "imagenet"
  dropout_rate: 0.5
  learning_rate: 0.0001
  epochs: 20

logging:
  log_dir: "logs"
  checkpoint_dir: "checkpoints/best_model.keras"
